# ===========================================================================
# AI 存储技术规划 —— 关注「主题」清单
#
# 用途：语义召回（core/theme_gate.py）。当一条新闻**没有命中任何关键词**，但来自
# 具名 RSS/媒体源时，先用各主题 vocab 的并集做本地粗筛，命中的再交给 LLM 判断它是否
# 「确实在讲」某个主题。属于则以该主题的 keyword（既有关键词）重新纳入候选池。
#
# 解决"只靠精确字符串匹配 → 新产品/新名字命不中关键词就被丢"的召回缺口：从内容出发
# 识别（如以后再出现 Reasonix-类 KV cache 方案、Lakebase-类向量库，不用先枚举名字）。
#
# 字段：
#   name        —— 主题名（LLM 判定时回填的标签，需唯一）
#   keyword     —— 命中本主题的条目归入哪个**既有关键词**（必须是 keywords.yaml 里的 name，
#                  这样能正常进入对应分类/排序；不要写不存在的关键词）
#   definition  —— 喂给 LLM 的一句话定义，判定从严的依据
#   vocab       —— 本地粗筛词表（小写子串匹配，命中其一才送 LLM）。宁可宽一点，
#                  精筛交给 LLM；但别放 "ai"/"model" 这种会把全网都放进来的泛词
# ===========================================================================

themes:
  - name: KV cache 与推理存储原语
    keyword: KV Cache
    definition: >-
      围绕 KV cache 的存储/复用/外置/分层与命中率优化：prefix caching、paged attention、
      KV offload、把 KV cache 卸载到内存/SSD/文件系统，以及以"提升 KV cache 命中、降低
      推理成本"为核心卖点的新系统/产品/agent（如 Reasonix）。重点是推理时的显存-内存-存储
      数据流，而不是泛泛的"推理加速"。
    vocab:
      - kv cache
      - kvcache
      - kv-cache
      - kv 缓存
      - prefix cach
      - 前缀缓存
      - paged attention
      - pagedattention
      - kv offload
      - kv 外置
      - 缓存命中
      - cache hit

  - name: 向量/图数据库与 AI 数据库
    keyword: Vector Database
    definition: >-
      向量数据库、图数据库、嵌入检索/ANN 索引，以及 lakehouse 内置的 AI 原生数据库/事务层
      （如 Databricks Lakebase）。代表"数据存储层向 AI 原生数据库（向量/图/OLTP 一体）演进"
      这条主线。顺带提一句"用了向量库"不算，要以数据库/检索本身为主题。
    vocab:
      - vector database
      - vector db
      - 向量数据库
      - 向量检索
      - vector search
      - vector index
      - 向量索引
      - embedding
      - 嵌入
      - ann index
      - 近似最近邻
      - graph database
      - 图数据库
      - lakebase
      - lakehouse

  - name: 并行/分布式文件系统与对象存储
    keyword: parallel file system
    definition: >-
      面向 AI 训练/推理的高性能并行/分布式文件系统、对象存储与文件系统新形态（含面向
      agent 的文件系统、KV 文件系统、POSIX-over-对象 等）。以"文件系统/存储系统本身"为主题，
      不是某个用它存数据的应用。
    vocab:
      - parallel file system
      - 并行文件系统
      - distributed file system
      - 分布式文件系统
      - 文件系统
      - file system
      - filesystem
      - 对象存储
      - object storage

  - name: Checkpoint 与训练存储
    keyword: checkpoint
    definition: >-
      大模型训练的 checkpoint 写入/加载/分片/压缩/异步化、断点续训，以及训练数据管线对
      存储带宽/容量/IOPS 的需求。以"训练态的存储读写"为主题。
    vocab:
      - checkpoint
      - 检查点
      - 模型快照
      - model snapshot
      - 断点续训

  - name: GPU IO 与数据通路
    keyword: GPUDirect
    definition: >-
      GPU 直连存储与数据通路：GPUDirect Storage/RDMA、NVMe-oF、DPU 存储卸载，以及推理/训练
      IO 路径与互联对存储栈选型的影响。以"GPU↔存储 的数据搬运路径"为主题。
    vocab:
      - gpudirect
      - gpu direct
      - rdma
      - roce
      - infiniband
      - nvme-of
      - nvme over
      - dpu
      - 数据通路
      - 存储卸载
      - storage offload
