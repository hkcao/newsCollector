# ===========================================================================
# AI 存储技术规划 —— 关键词清单
# 目标读者：AI 存储技术规划与分析师
# 选词原则：能影响 AI 训练/推理存储栈（容量、带宽、延迟、$/GB、生态兼容）的
#           厂商、产品、协议、开源项目、概念，统统纳入。
# ===========================================================================

# 重点关注名单（watchlist）：你长期跟踪、希望"只要当周有新闻就别被埋掉"的具体词。
# 命中（标题/摘要含其一）的条目会被**保送进 LLM 候选池前排**并打【重点关注】标，
# 绕过"单源低客观分被 top-N 截断"的问题（这类小众产品常只来自 Google News 单源）。
# 是否最终入选仍由 LLM 判断（纯转载/无实质进展可不选），但不会再在 LLM 之前就被丢。
watchlist: []
  # 示例：- Reasonix    # 想强制某个具体事件一定出现在报告时再填；
  #       - Lakebase    # 日常优先靠"追踪厂商 + 主题门"做内容召回，尽量不在这里枚举产品名。

keywords:

